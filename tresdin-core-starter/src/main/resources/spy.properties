# ==============================================================================
# 1. 模块加载配置 (Module List)
# ==============================================================================
# 启用核心模块、日志记录模块和慢查询检测模块
modulelist=com.p6spy.engine.spy.P6SpyFactory,com.p6spy.engine.logging.P6LogFactory,com.p6spy.engine.outage.P6OutageFactory

# ==============================================================================
# 2. 日志输出配置 (Appender)
# ==============================================================================
# 推荐集成到 SLF4J (Logback/Log4j2)，以便统一管理日志级别和输出路径
# 如果希望直接输出到控制台，可改为: com.p6spy.engine.spy.appender.StdoutLogger
# 如果希望输出到文件，可改为: com.p6spy.engine.spy.appender.FileLogger
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# 如果使用 FileLogger，需指定日志文件路径和追加模式
# logfile=spy.log
# append=true

# ==============================================================================
# 3. 日志格式定制 (Format)
# ==============================================================================
# 使用自定义行格式，以便灵活控制输出内容
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat

# 自定义格式模板：
# %(currentTime): 当前时间
# %(executionTime): SQL 执行耗时 (毫秒)
# %(category): 操作类型 (statement, batch, commit 等)
# %(connectionId): 数据库连接 ID
# %(sqlSingleLine): 替换参数后的完整 SQL (单行显示，避免换行符干扰)
customLogMessageFormat=耗时 %(executionTime)ms | 连接 %(connectionId) | %(sqlSingleLine)

# 日期格式 currentTime
# dateformat=yyyy-MM-dd HH:mm:ss:SSS

# ==============================================================================
# 4. 过滤与噪音控制 (Filtering)
# ==============================================================================
# 排除不需要记录的类别，减少日志噪音
# 通常排除: info, debug, result, resultset, batch (除非你需要调试批处理)
excludecategories=info,debug,result,resultset,batch

# 是否记录二进制字段内容 (设为 true 以避免日志中出现大量乱码或大段二进制数据)
excludebinary=true

# 是否记录 JDBC 连接事件 (connect/disconnect)
logConnect=false

# 是否记录事务提交/回滚事件
logCommit=false
logRollback=false

# ==============================================================================
# 5. 驱动与代理配置 (Driver & Proxy)
# ==============================================================================
# 真实数据库驱动列表 (根据实际数据库修改，多个用逗号分隔)
# MySQL 8+: com.mysql.cj.jdbc.Driver
# MySQL 5: com.mysql.jdbc.Driver
# Oracle: oracle.jdbc.driver.OracleDriver
# driverlist=com.mysql.cj.jdbc.Driver

# 是否注销真实驱动 (防止应用绕过 P6Spy 直接连接数据库)
deregisterdrivers=true

# ==============================================================================
# 6. 性能监控与高级选项 (Performance & Advanced)
# ==============================================================================
# 慢查询阈值 (毫秒)。只有执行时间超过此值的 SQL 才会被记录。
# 设为 0 表示记录所有 SQL；开发环境建议设为 0，生产排查时可设为 100 或更高
executionThreshold=0

# 是否启用堆栈跟踪打印 (有助于定位是哪行代码发出的 SQL，但性能开销较大)
stacktrace=false
# 如果开启 stacktrace，可以指定只打印包含特定包名的堆栈帧，减少无关信息
# stacktraceclass=com.yourpackage.service

# 是否自动重载配置文件 (开发环境下设为 true，修改配置后无需重启)
reloadproperties=true
reloadpropertiesinterval=60

# 是否暴露 JMX 接口 (允许通过 JConsole 动态查看状态)
jmx=false
